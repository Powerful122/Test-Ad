<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- Immediate redirect -->
  <meta http-equiv="refresh" content="0; url=https://enkaare.com">
  
  <title>Our Test Ad</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f8f9fa;
      font-family: -apple-system, BlinkMacOSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    h1 {
      font-size: 2.8rem;
      margin: 0.4em 0 0.2em;
      text-align: center;
    }
    .tagline {
      font-size: 1.5rem;
      color: #555;
      margin: 0 1rem 2rem;
      text-align: center;
    }
    img {
      max-width: 95vw;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .redirect-notice {
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #777;
      text-align: center;
    }
    a {
      color: #0066cc;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>Our Test Ad</h1>
  <p class="tagline">Shop now</p>
  
  <img 
    src="https://i.ibb.co/tw7CxL7C/image.png" 
    alt="Advertisement preview image"
  >
  
  <p class="redirect-notice">
    Redirecting to <a href="https://enkaare.com">enkaare.com</a>...<br>
    If you are not redirected automatically, click the link above.
  </p>

</body>
</html>
